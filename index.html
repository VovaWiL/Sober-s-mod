<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sober's Mod | Local Dev</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/ammo.js"></script> 
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="crosshair"></div>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let grabInfo = { heldMesh: null, originalParent: null };

        const createScene = async function() {
            const scene = new BABYLON.Scene(engine);
            
            await Ammo();
            scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), new BABYLON.AmmoJSPlugin());

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            
            // Пол
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 50, height: 50}, scene);
            ground.physicsImposter = new BABYLON.PhysicsImposter(ground, BABYLON.PhysicsImposter.BoxImposter, { mass: 0 }, scene);

            // 1. Загрузка Персонажа
            BABYLON.SceneLoader.ImportMesh("", "./models/", "Humman.glb", scene, function (meshes) {
                const player = meshes[0];
                player.position = new BABYLON.Vector3(0, 5, 0);
                player.physicsImposter = new BABYLON.PhysicsImposter(player, BABYLON.PhysicsImposter.CapsuleImposter, { mass: 80 }, scene);
                
                const camera = new BABYLON.FreeCamera("fpsCam", new BABYLON.Vector3(0, 1.8, 0), scene);
                camera.parent = player;
                camera.attachControl(canvas, true);
                
                // 2. Загрузка Гравипушки в руки
                BABYLON.SceneLoader.ImportMesh("", "./models/", "gravity_gun_and_supercharged_gravity_gun.glb", scene, function (gMeshes) {
                    const gGun = gMeshes[0];
                    gGun.parent = camera;
                    gGun.scaling = new BABYLON.Vector3(0.1, 0.1, 0.1);
                    gGun.position = new BABYLON.Vector3(0.5, -0.5, 1);
                    gGun.rotation = new BABYLON.Vector3(0, Math.PI, 0);
                });
            });

            // 3. Функция спавна предметов
            function spawnProp(file, pos) {
                BABYLON.SceneLoader.ImportMesh("", "./models/", file, scene, function (meshes) {
                    const prop = meshes[0];
                    prop.position = pos;
                    prop.isPickable = true;
                    prop.physicsImposter = new BABYLON.PhysicsImposter(prop, BABYLON.PhysicsImposter.BoxImposter, { mass: 2 }, scene);
                });
            }

            spawnProp("ak-47.glb", new BABYLON.Vector3(2, 2, 5));
            spawnProp("phone_17_pro_max.glb", new BABYLON.Vector3(-2, 2, 5));

            // Логика Гравипушки
            scene.onPointerDown = (evt) => {
                const pick = scene.pick(canvas.width/2, canvas.height/2);
                if (pick.hit && pick.pickedMesh.name !== "ground") {
                    grabInfo.heldMesh = pick.pickedMesh;
                    grabInfo.heldMesh.physicsImposter.setMass(0);
                }
            };

            scene.onPointerUp = () => {
                if (grabInfo.heldMesh) {
                    grabInfo.heldMesh.physicsImposter.setMass(2);
                    grabInfo.heldMesh = null;
                }
            };

            scene.registerBeforeRender(() => {
                if (grabInfo.heldMesh) {
                    const cam = scene.getCameraByName("fpsCam");
                    const targetPos = cam.getFrontPosition(3);
                    grabInfo.heldMesh.position = BABYLON.Vector3.Lerp(grabInfo.heldMesh.position, targetPos, 0.1);
                }
            });

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => scene.render());
        });

        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
